# Production frontend — internal nginx only; Kong on :80 routes / and /api.
name: saffron-frontend

services:
  web:
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE}
    container_name: saffron-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - saffron_net

networks:
  saffron_net:
    name: saffron_net
    external: true
