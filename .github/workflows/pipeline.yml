# platform-frontend — one pipeline: test → build → deploy
name: pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/saffron-rest/platform-frontend

jobs:
  test:
    name: 1 · Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci && npm run build
        env:
          VITE_API_URL: /api

  build:
    name: 2 · Build & push image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          build-args: VITE_API_URL=/api
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: 3 · Deploy web to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment:
      name: production
      url: http://cash-flow.saffron.waw.pl
    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
        run: |
          missing=0
          if [ -z "$VPS_HOST" ]; then echo "::error::Missing secret VPS_HOST (e.g. 76.13.130.67)"; missing=1; fi
          if [ -z "$VPS_USER" ]; then echo "::error::Missing secret VPS_USER (e.g. root)"; missing=1; fi
          if [ -z "$SSH_PRIVATE_KEY" ] && [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing SSH key — add repository secret SSH_PRIVATE_KEY (or VPS_SSH_KEY) with the full private key"
            missing=1
          fi
          if [ -z "$GHCR_TOKEN" ]; then
            echo "::error::Missing GHCR_TOKEN — PAT with read:packages (or make the GHCR package public)"
            missing=1
          fi
          if [ -z "$GHCR_USERNAME" ]; then
            echo "::error::Missing GHCR_USERNAME — your GitHub username (owner of the PAT)"
            missing=1
          fi
          exit "$missing"

      - name: Upload deploy files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: deploy/
          target: /docker/saffron-frontend/
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          FRONTEND_IMAGE: ${{ env.IMAGE }}:latest
          HTTP_PORT: ${{ secrets.HTTP_PORT }}
          REGISTRY_USER: ${{ secrets.GHCR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY || secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          envs: FRONTEND_IMAGE,HTTP_PORT,REGISTRY_USER,REGISTRY_PASSWORD
          script: |
            chmod +x /docker/saffron-frontend/deploy.sh
            export VPS_APP_DIR=/docker/saffron-frontend
            bash /docker/saffron-frontend/deploy.sh
